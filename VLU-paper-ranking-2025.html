<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VLU paper ranking - 2025</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background: #f5f7fa;
        margin: 40px auto;
        max-width: 900px;
        color: #333;
      }
      h1 {
        text-align: center;
        font-weight: 600;
        margin-bottom: 24px;
        color: #444;
      }
      .input-row {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
        align-items: center;
      }
      .search-row {
        display: grid;
        grid-template-columns: 1fr 2fr auto;
        gap: 12px;
        margin-bottom: 12px;
        align-items: center;
      }
      .input-row input,
      .search-row input {
        padding: 8px 12px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
        transition: border-color 0.2s;
      }
      .input-row input:focus,
      .search-row input:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 6px #3b82f6aa;
      }
      .input-row input::placeholder,
      .search-row input::placeholder {
        font-size: 14px;
        color: #aaa;
      }
      button.add-btn {
        background-color: #3b82f6;
        border: none;
        color: white;
        padding: 10px 16px;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button.add-btn:hover {
        background-color: #2563eb;
      }
      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 6px;
      }
      thead th {
        text-align: left;
        padding: 12px 16px;
        background: #e0e7ff;
        color: #1e40af;
        border-radius: 6px 6px 0 0;
      }
      tbody tr {
        background: white;
        box-shadow: 0 1px 4px rgb(0 0 0 / 0.1);
      }
      tbody td {
        padding: 12px 16px;
        border-bottom: 1px solid #f0f0f0;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      .no-data {
        text-align: center;
        padding: 24px;
        color: #777;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>VLU PAPER RANKING - 2025</h1>

    <div class="search-row">
      <label for="search-input" style="font-weight:600;align-self:center;">Search for Journal Name:</label>
      <input type="text" id="search-input" placeholder="Type to search..." />
      <div></div>
    </div>

    <form id="data-form" class="input-row" autocomplete="off">
      <input type="number" id="year-input" placeholder="Year" required min="1900" max="2100" />
      <input type="text" id="journal-name-input" placeholder="Journal's Name" required />
      <input type="number" id="h-index-input" placeholder="H-Index" required min="0" />
      <input type="text" id="subject-category-input" placeholder="Subject Category (SC)" required />
      <input type="number" id="num-journals-input" placeholder="Num. J. in SC" required min="0" />
      <input type="number" id="journal-ranking-input" placeholder="J. Ranking in SC" required min="1" />
      <input type="number" id="quality-index-input" placeholder="Quality Index (Q)" required min="0" />
      <button type="submit" class="add-btn">Add</button>
    </form>

    <table aria-label="Data table">
      <thead>
        <tr>
          <th>Year</th>
          <th>Journal Name</th>
          <th>H-Index</th>
          <th>Subject Category (SC)</th>
          <th>Number of Journals in SC</th>
          <th>Journal's Ranking in SC</th>
          <th>Quality Index (Q)</th>
          <th>VLU's Percent</th>
          <th>VLU's Ranking</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="9" class="no-data">No data entered yet.</td></tr>
      </tbody>
    </table>

    <script>
      (() => {
        const form = document.getElementById('data-form');
        const tableBody = document.getElementById('table-body');
        const searchInput = document.getElementById('search-input');

        let dataEntries = [];
        let filteredEntries = [];

        form.addEventListener('submit', e => {
          e.preventDefault();
          const year = parseInt(document.getElementById('year-input').value, 10);
          const journalName = document.getElementById('journal-name-input').value.trim();
          const hIndex = parseInt(document.getElementById('h-index-input').value, 10);
          const subjectCategory = document.getElementById('subject-category-input').value.trim();
          const numJournals = parseInt(document.getElementById('num-journals-input').value, 10);
          const journalRanking = parseInt(document.getElementById('journal-ranking-input').value, 10);
          const qualityIndex = parseInt(document.getElementById('quality-index-input').value, 10);

          if (isNaN(year) || !journalName || isNaN(hIndex) || !subjectCategory || isNaN(numJournals) || isNaN(journalRanking) || isNaN(qualityIndex)) {
            alert('Please enter valid values.');
            return;
          }

          // Kiểm tra trùng lặp
          const existingIndex = dataEntries.findIndex(entry => 
          entry.journalName === journalName && entry.subjectCategory === subjectCategory
          );
          // Cập nhật mục đã tồn tại
          if (existingIndex !== -1) {
            dataEntries[existingIndex] = {
              year,
              journalName,
              hIndex,
              subjectCategory,
              numJournals,
              journalRanking,
              qualityIndex
            };
          } else {
          // Thêm dữ liệu vào mảng dataEntries
            dataEntries.push({
              year,
              journalName,
              hIndex,
              subjectCategory,
              numJournals,
              journalRanking,
              qualityIndex
            });
          }

          renderTable(dataEntries);
          form.reset();
          document.getElementById('year-input').focus();

          // Gửi dữ liệu đến Google Apps Script
          fetch('https://script.google.com/macros/s/AKfycbw2Y4a_gt0et02gzREjMjRyWVt3W8P7gb0JBfpjm_T-LkFCYGrlam4TDKPv8zPf5ryU/exec', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                        year,
                        journalName,
                        hIndex,
                        subjectCategory,
                        numJournals,
                        journalRanking,
                        qualityIndex
                      })
          })
          .then(response => {
            if (!response.ok) {
              throw new Error('Network response was not ok: ' + response.statusText);
            }
            return response.json();
          })
          .then(data => {
            console.log('File ID:', data.fileId); // ID của file đã lưu
            renderTable(dataEntries);
            form.reset();
            document.getElementById('year-input').focus();
          })
          .catch(error => {
            console.error('Error:', error);
          });
        });

        searchInput.addEventListener('input', e => {
          const query = e.target.value.trim().toLowerCase();
          if (!query) {
            filteredEntries = [...dataEntries];
          } else {
            filteredEntries = dataEntries.filter(entry =>
              entry.journalName.toLowerCase().includes(query)
            );
          }
          renderTable(filteredEntries);
        });

        function renderTable(entries) {
          if (entries.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="9" class="no-data">No data entered yet.</td></tr>';
            return;
          }

          // Sort by Journal Name alphabetically
          entries.sort((a, b) => {
            let nameA = a.journalName.toLowerCase();
            let nameB = b.journalName.toLowerCase();
            if (nameA < nameB) return -1;
            if (nameA > nameB) return 1;
            return 0;
          });

          tableBody.innerHTML = entries.map(entry => {
            const vluPercent = (entry.journalRanking / entry.numJournals) * 100.00;
            let vluRanking = '';
            if (entry.numJournals >= 2000) {
              if (entry.qualityIndex == 1) {
                if (vluPercent < 5.00) {
                  vluRanking = 1;
                } else if (vluPercent < 10.00) {
                  vluRanking = 2;
                }
              } else if (entry.qualityIndex == 2) {
                if (vluPercent < 18.00) {
                  vluRanking = 3;
                } else if (vluPercent < 30.00) {
                  vluRanking = 4;
                } else if (vluPercent < 43.00) {
                  vluRanking = 5;
                }
              } else if (entry.qualityIndex == 3) {
                if (vluPercent < 56.00) {
                  vluRanking = 6;
                } else if (vluPercent < 69.00) {
                  vluRanking = 7;
                } else if (vluPercent < 82.00) {
                  vluRanking = 8;
                }
              } else if (entry.qualityIndex == 4) {
                if (vluPercent >= 82.00) {
                  vluRanking = 9;
                }
              }
            } else if (entry.numJournals >= 1500 && entry.numJournals < 2000) {
              if (entry.qualityIndex == 1) {
                if (vluPercent < 6.00) {
                  vluRanking = 1;
                } else if (vluPercent < 11.00) {
                  vluRanking = 2;
                }
              } else if (entry.qualityIndex == 2) {
                if (vluPercent < 19.00) {
                  vluRanking = 3;
                } else if (vluPercent < 31.00) {
                  vluRanking = 4;
                } else if (vluPercent < 44.00) {
                  vluRanking = 5;
                }
              } else if (entry.qualityIndex == 3) {
                if (vluPercent < 57.00) {
                  vluRanking = 6;
                } else if (vluPercent < 70.00) {
                  vluRanking = 7;
                } else if (vluPercent < 83.00) {
                  vluRanking = 8;
                }
              } else if (entry.qualityIndex == 4) {
                if (vluPercent >= 83.00) {
                  vluRanking = 9;
                }
              }
            } else if (entry.numJournals >= 1000 && entry.numJournals < 1500) {
              if (entry.qualityIndex == 1) {
                if (vluPercent < 7.00) {
                  vluRanking = 1;
                } else if (vluPercent < 12.00) {
                  vluRanking = 2;
                }
              } else if (entry.qualityIndex == 2) {
                if (vluPercent < 20.00) {
                  vluRanking = 3;
                } else if (vluPercent < 32.00) {
                  vluRanking = 4;
                } else if (vluPercent < 45.00) {
                  vluRanking = 5;
                }
              } else if (entry.qualityIndex == 3) {
                if (vluPercent < 58.00) {
                  vluRanking = 6;
                } else if (vluPercent < 71.00) {
                  vluRanking = 7;
                } else if (vluPercent < 84.00) {
                  vluRanking = 8;
                }
              } else if (entry.qualityIndex == 4) {
                if (vluPercent >= 84.00) {
                  vluRanking = 9;
                }
              }
            } else if (entry.numJournals >= 500 && entry.numJournals < 1000) {
              if (entry.qualityIndex == 1) {
                if (vluPercent < 8.00) {
                  vluRanking = 1;
                } else if (vluPercent < 13.00) {
                  vluRanking = 2;
                }
              } else if (entry.qualityIndex == 2) {
                if (vluPercent < 21.00) {
                  vluRanking = 3;
                } else if (vluPercent < 33.00) {
                  vluRanking = 4;
                } else if (vluPercent < 46.00) {
                  vluRanking = 5;
                }
              } else if (entry.qualityIndex == 3) {
                if (vluPercent < 59.00) {
                  vluRanking = 6;
                } else if (vluPercent < 72.00) {
                  vluRanking = 7;
                } else if (vluPercent < 85.00) {
                  vluRanking = 8;
                }
              } else if (entry.qualityIndex == 4) {
                if (vluPercent >= 85.00) {
                  vluRanking = 9;
                }
              }
            } else if (entry.numJournals >= 200 && entry.numJournals < 500) {
              if (entry.qualityIndex == 1) {
                if (vluPercent < 10.00) {
                  vluRanking = 1;
                } else if (vluPercent < 15.00) {
                  vluRanking = 2;
                }
              } else if (entry.qualityIndex == 2) {
                if (vluPercent < 23.00) {
                  vluRanking = 3;
                } else if (vluPercent < 35.00) {
                  vluRanking = 4;
                } else if (vluPercent < 48.00) {
                  vluRanking = 5;
                }
              } else if (entry.qualityIndex == 3) {
                if (vluPercent < 61.00) {
                  vluRanking = 6;
                } else if (vluPercent < 74.00) {
                  vluRanking = 7;
                } else if (vluPercent < 87.00) {
                  vluRanking = 8;
                }
              } else if (entry.qualityIndex == 4) {
                if (vluPercent >= 87.00) {
                  vluRanking = 9;
                }
              }
            } else if (entry.numJournals >= 50 && entry.numJournals < 200) {
              if (entry.qualityIndex == 1) {
                if (vluPercent < 11.00) {
                  vluRanking = 1;
                } else if (vluPercent < 16.00) {
                  vluRanking = 2;
                }
              } else if (entry.qualityIndex == 2) {
                if (vluPercent < 24.00) {
                  vluRanking = 3;
                } else if (vluPercent < 36.00) {
                  vluRanking = 4;
                } else if (vluPercent < 49.00) {
                  vluRanking = 5;
                }
              } else if (entry.qualityIndex == 3) {
                if (vluPercent < 62.00) {
                  vluRanking = 6;
                } else if (vluPercent < 75.00) {
                  vluRanking = 7;
                } else if (vluPercent < 88.00) {
                  vluRanking = 8;
                }
              } else if (entry.qualityIndex == 4) {
                if (vluPercent >= 88.00) {
                  vluRanking = 9;
                }
              }
            } else if (entry.numJournals < 50) {
              if (entry.qualityIndex == 1) {
                if (vluPercent < 15.00) {
                  vluRanking = 1;
                } else if (vluPercent < 25.00) {
                  vluRanking = 2;
                }
              } else if (entry.qualityIndex == 2) {
                if (vluPercent < 33.00) {
                  vluRanking = 3;
                } else if (vluPercent < 45.00) {
                  vluRanking = 4;
                } else if (vluPercent < 50.00) {
                  vluRanking = 5;
                }
              } else if (entry.qualityIndex == 3) {
                if (vluPercent < 66.00) {
                  vluRanking = 6;
                } else if (vluPercent < 79.00) {
                  vluRanking = 7;
                } else if (vluPercent < 92.00) {
                  vluRanking = 8;
                }
              } else if (entry.qualityIndex == 4) {
                if (vluPercent >= 92.00) {
                  vluRanking = 9;
                }
              }
            }

            return `
              <tr onclick="editEntry(${entries.indexOf(entry)})">
                <td>${entry.year}</td>
                <td>${escapeHtml(entry.journalName)}</td>
                <td>${entry.hIndex}</td>
                <td>${escapeHtml(entry.subjectCategory)}</td>
                <td>${entry.numJournals}</td>
                <td>${entry.journalRanking}</td>
                <td>${entry.qualityIndex}</td>
                <td>${vluPercent.toFixed(2)}%</td>
                <td>${vluRanking}</td>
              </tr>
            `;
          }).join('');
        }

        window.editEntry = function(index) {
          const entry = dataEntries[index];
          document.getElementById('year-input').value = entry.year;
          document.getElementById('journal-name-input').value = entry.journalName;
          document.getElementById('h-index-input').value = entry.hIndex;
          document.getElementById('subject-category-input').value = entry.subjectCategory;
          document.getElementById('num-journals-input').value = entry.numJournals;
          document.getElementById('journal-ranking-input').value = entry.journalRanking;
          document.getElementById('quality-index-input').value = entry.qualityIndex;
        };

        function escapeHtml(text) {
          if (!text) return '';
          return text.replace(/[&<>"']/g, function(m) {
            return {
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#39;'
            }[m];
          });
        }

        // Initial render
        renderTable(dataEntries);
      })();
    </script>

  </body>
</html>
